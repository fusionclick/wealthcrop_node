name: build & publish

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # GITHUB_TOKEN se hi kaam ho jata hai — koi secret set nahi karni
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3   # default 'docker' driver GHA cache export nahi kar sakta
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
